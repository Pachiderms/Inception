networks:
  Inception:
    name: Inception
    driver: bridge

volumes:
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tzizi/data/wordpress
  database:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tzizi/data/mariadb